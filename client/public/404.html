<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Single Page App redirect for GitHub Pages with base path
        // Redirect all 404s to index.html to let React Router handle the routing
        var segmentCount = 1; // Account for /website-builder/ base path
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, -1 * segmentCount).join('/') + '/website-builder/?p=' +
            l.pathname.slice(1).split('/').slice(segmentCount).join('/') + (l.search ? '&' + l.search.slice(1) : '') + l.hash
        );
    </script>
</head>
<body>
    <div>Redirecting...</div>
</body>
</html>
