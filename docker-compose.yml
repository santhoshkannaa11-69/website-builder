services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: website-builder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: website_builder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - website-builder-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: website-builder-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - website-builder-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: website-builder-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/website_builder
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-your-secret-key-here}
      AI_API_KEY: ${AI_API_KEY:-your-openai-api-key}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-your-stripe-secret-key}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-your-stripe-webhook-secret}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost,http://localhost:80}
      PORT: 3000
    volumes:
      - ./server/prisma:/app/prisma:ro
    ports:
      - "3000:3000"
    networks:
      - website-builder-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Application
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: website-builder-frontend
    restart: unless-stopped
    environment:
      VITE_BASEURL: ${VITE_BASEURL:-http://localhost}
    ports:
      - "80:80"
      - "443:443"
    networks:
      - website-builder-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Database Migration Service (runs once)
  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: website-builder-migrate
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/website_builder
    command: npx prisma migrate deploy
    networks:
      - website-builder-network
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  website-builder-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
