apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-builder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website-builder
  template:
    metadata:
      labels:
        app: website-builder
    spec:
      containers:
      - name: website-builder
        image: santhoshkannaa/my-website  # Replace with your Docker image name/tag if pushed to a registry
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: website-builder-service
spec:
  selector:
    app: website-builder
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer  # Or ClusterIP for internal access