version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: website-builder-db
    environment:
      POSTGRES_DB: website_builder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: website-builder-redis
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: website-builder-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/website_builder
      REDIS_URL: redis://:redis123@redis:6379
      AI_API_KEY: ${AI_API_KEY:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-7fNv0oXPNSSa69BMPQLGF2Q3GIHWvvek}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost}
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: website-builder-frontend
    environment:
      VITE_BASEURL: ${VITE_BASEURL:-http://localhost}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
